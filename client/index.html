<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Arcade — Streets of Rage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; }
    #connection-status { position: fixed; top: 10px; right: 10px; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; z-index: 999; font-family: Arial; }
    .status-connected    { background: #00c853; color: #fff; }
    .status-disconnected { background: #d50000; color: #fff; }
    .status-connecting   { background: #ff6d00; color: #fff; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="connection-status" class="status-connecting">Connecting...</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
